{{ define "layout" }}
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ if .Title }}{{ .Title }}{{ else }}Admin{{ end }} — Foods &amp; Drinks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; width: 220px; height: 100vh;
      background: #1a1a2e; color: #ccc; display: flex; flex-direction: column;
    }
    .sidebar-brand {
      padding: 20px 18px; font-size: 1.1rem; font-weight: 700;
      color: #fff; border-bottom: 1px solid #2a2a4a; letter-spacing: .5px;
    }
    .sidebar-brand span { color: #e94560; }
    .sidebar nav { flex: 1; padding: 12px 0; }
    .sidebar nav a {
      display: block; padding: 10px 18px; color: #bbb; text-decoration: none;
      font-size: .9rem; transition: background .15s, color .15s;
    }
    .sidebar nav a:hover, .sidebar nav a.active { background: #2a2a4a; color: #fff; }
    .sidebar nav .nav-label {
      padding: 14px 18px 4px; font-size: .7rem; text-transform: uppercase;
      letter-spacing: 1px; color: #555;
    }

    /* Main */
    .main { margin-left: 220px; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      background: #fff; border-bottom: 1px solid #e5e5e5;
      padding: 14px 28px; font-size: .85rem; color: #888;
    }
    .content { padding: 28px; flex: 1; }

    /* Cards */
    .card {
      background: #fff; border-radius: 8px; border: 1px solid #e5e5e5;
      padding: 24px; margin-bottom: 20px;
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-title { font-size: 1.1rem; font-weight: 600; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer;
      font-size: .875rem; font-weight: 500; text-decoration: none; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-secondary { background: #6c757d; color: #fff; }
    .btn-warning { background: #f59e0b; color: #fff; }
    .btn-danger { background: #dc2626; color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: .8rem; }
    .btn-outline {
      background: transparent; border: 1px solid #d1d5db; color: #374151;
    }
    .btn-outline:hover { background: #f9fafb; }

    /* Table */
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    thead th {
      text-align: left; padding: 10px 14px; background: #f9fafb;
      border-bottom: 2px solid #e5e5e5; font-weight: 600; color: #555;
      font-size: .8rem; text-transform: uppercase; letter-spacing: .5px;
    }
    tbody td { padding: 12px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #fafafa; }

    /* Badge */
    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: .75rem; font-weight: 600;
    }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-inactive { background: #fee2e2; color: #991b1b; }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; margin-bottom: 6px; font-size: .875rem; font-weight: 500; }
    .form-control {
      width: 100%; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: .875rem; outline: none; transition: border-color .15s;
    }
    .form-control:focus { border-color: #e94560; }
    .form-hint { margin-top: 4px; font-size: .78rem; color: #888; }
    .form-error { margin-top: 4px; font-size: .78rem; color: #dc2626; }
    select.form-control { background: #fff; }
    textarea.form-control { resize: vertical; min-height: 90px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* Alert / Flash */
    .alert {
      padding: 12px 16px; border-radius: 6px; margin-bottom: 20px;
      font-size: .875rem; display: flex; align-items: center; gap: 8px;
    }
    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    /* Pagination */
    .pagination { display: flex; gap: 6px; align-items: center; margin-top: 20px; }
    .pagination a, .pagination span {
      display: inline-flex; align-items: center; justify-content: center;
      width: 34px; height: 34px; border-radius: 6px; font-size: .85rem;
      text-decoration: none; border: 1px solid #e5e5e5; color: #374151;
    }
    .pagination a:hover { background: #f3f4f6; }
    .pagination .active { background: #e94560; color: #fff; border-color: #e94560; }
    .pagination .disabled { color: #ccc; pointer-events: none; }

    /* Filter bar */
    .filter-bar { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-bar .form-group { margin-bottom: 0; }
    .filter-bar .form-control { min-width: 160px; }

    /* Actions column */
    .actions { display: flex; gap: 6px; }

    /* Confirm delete inline */
    .delete-form { display: inline; }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-brand">Foods &amp; <span>Drinks</span></div>
  <nav>
    <div class="nav-label">Quản lý</div>
    <a href="/admin/categories" {{ if eq .ActiveMenu "categories" }}class="active"{{ end }}>
      Danh mục
    </a>
    <a href="/admin/products" {{ if eq .ActiveMenu "products" }}class="active"{{ end }}>
      Sản phẩm
    </a>
  </nav>
</div>

<div class="main">
  <div class="topbar">Admin Panel</div>
  <div class="content">
    {{ if .Flash }}
      <div class="alert alert-{{ .Flash.Type }}">{{ .Flash.Message }}</div>
    {{ end }}
    {{ template "page_content" . }}
  </div>
</div>

</body>
</html>
{{ end }}
