app:
  name: "Foods & Drinks API"
  env: "development"
  port: 8000

database:
  host: "localhost"
  port: 3306
  username: "root"
  password: "password"
  dbname: "foods_drinks"
  charset: "utf8mb4"
  parse_time: true
  loc: "Local"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

jwt:
  secret: "your-secret-key-change-in-production"
  expiration: 24h

oauth:
  google:
    client_id: "your-google-client-id"
    client_secret: "your-google-client-secret"
    redirect_url: "http://localhost:8000/api/v1/auth/google/callback"
  # facebook:
  #   client_id: "your-facebook-client-id"
  #   client_secret: "your-facebook-client-secret"
  #   redirect_url: "http://localhost:8000/api/v1/auth/facebook/callback"
  # twitter:
  #   client_id: "your-twitter-client-id"
  #   client_secret: "your-twitter-client-secret"
  #   redirect_url: "http://localhost:8000/api/v1/auth/twitter/callback"

upload:
  path: "uploads/avatars"
  max_size: 2097152  # 2MB in bytes
  allowed_types:
    - "jpg"
    - "jpeg"
    - "png"
    - "webp"

email:
  enabled: true
  smtp_host: "localhost"
  smtp_port: 1025
  username: ""
  password: "" # use EMAIL_PASSWORD env var
  from_email: "no-reply@foods-drinks.local"
  from_name: "Foods & Drinks"
  admin_recipient: "admin@foods-drinks.local"
  subject_prefix: "[Foods & Drinks]"
  order_template_path: "templates/email/new_order.html"
  max_retries: 3
  retry_delay_seconds: 3
  max_workers: 4
  queue_size: 100

