basePath: /
definitions:
  dto.AddCartItemRequest:
    properties:
      product_id:
        type: integer
      quantity:
        minimum: 1
        type: integer
    required:
    - product_id
    - quantity
    type: object
  dto.AuthResponse:
    properties:
      access_token:
        type: string
      expires_in:
        type: integer
      token_type:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.AvatarResponse:
    properties:
      avatar_url:
        type: string
    type: object
  dto.CartItemResponse:
    properties:
      id:
        type: integer
      image_url:
        type: string
      name:
        type: string
      price:
        type: number
      product_id:
        type: integer
      quantity:
        type: integer
      subtotal:
        type: number
    type: object
  dto.CartResponse:
    properties:
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/dto.CartItemResponse'
        type: array
      total_amount:
        type: number
      total_items:
        type: integer
    type: object
  dto.CreateOrderRequest:
    properties:
      notes:
        maxLength: 5000
        type: string
      shipping_address:
        maxLength: 2000
        type: string
      shipping_phone:
        maxLength: 20
        minLength: 8
        type: string
    required:
    - shipping_address
    - shipping_phone
    type: object
  dto.CreateRatingRequest:
    properties:
      comment:
        maxLength: 2000
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - rating
    type: object
  dto.CreateSuggestionRequest:
    properties:
      category_id:
        type: integer
      classify:
        enum:
        - food
        - drink
        type: string
      description:
        maxLength: 5000
        type: string
      name:
        maxLength: 255
        minLength: 2
        type: string
    required:
    - classify
    - name
    type: object
  dto.ErrorResponse:
    properties:
      details:
        additionalProperties:
          type: string
        type: object
      error:
        type: string
      message:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.OAuthProvidersResponse:
    properties:
      providers:
        items:
          type: string
        type: array
    type: object
  dto.OAuthURLResponse:
    properties:
      provider:
        type: string
      state:
        type: string
      url:
        type: string
    type: object
  dto.OrderItemResponse:
    properties:
      id:
        type: integer
      product_id:
        type: integer
      product_name:
        type: string
      product_price:
        type: number
      quantity:
        type: integer
      subtotal:
        type: number
    type: object
  dto.OrderResponse:
    properties:
      created_at:
        type: string
      id:
        type: integer
      item_count:
        type: integer
      items:
        items:
          $ref: '#/definitions/dto.OrderItemResponse'
        type: array
      notes:
        type: string
      order_number:
        type: string
      shipping_address:
        type: string
      shipping_phone:
        type: string
      status:
        type: string
      total_amount:
        type: number
      updated_at:
        type: string
      user_email:
        type: string
      user_id:
        type: integer
      user_name:
        type: string
    type: object
  dto.PaginatedResponse:
    properties:
      items: {}
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.ProductImageResponse:
    properties:
      alt_text:
        type: string
      id:
        type: integer
      image_url:
        type: string
      is_primary:
        type: boolean
      sort_order:
        type: integer
    type: object
  dto.ProductResponse:
    properties:
      category_id:
        type: integer
      category_name:
        type: string
      classify:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      images:
        items:
          $ref: '#/definitions/dto.ProductImageResponse'
        type: array
      name:
        type: string
      price:
        type: number
      primary_image:
        $ref: '#/definitions/dto.ProductImageResponse'
      rating_average:
        type: number
      rating_count:
        type: integer
      slug:
        type: string
      social_share:
        $ref: '#/definitions/dto.ProductSocialShareResponse'
      status:
        type: string
      stock:
        type: integer
      updated_at:
        type: string
    type: object
  dto.ProductSocialShareResponse:
    properties:
      facebook:
        type: string
      google:
        type: string
      twitter:
        type: string
    type: object
  dto.RatingResponse:
    properties:
      comment:
        type: string
      created_at:
        type: string
      id:
        type: integer
      order_id:
        type: integer
      product_id:
        type: integer
      rating:
        type: integer
      updated_at:
        type: string
      user_avatar:
        type: string
      user_id:
        type: integer
      user_name:
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        maxLength: 255
        type: string
      full_name:
        maxLength: 255
        minLength: 2
        type: string
      password:
        description: |-
          Password must be 8-72 characters. Max 72 is bcrypt's limit.
          Must contain at least one uppercase, one lowercase, one digit, and one special character.
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - full_name
    - password
    type: object
  dto.SuggestionResponse:
    properties:
      admin_note:
        type: string
      category_id:
        type: integer
      category_name:
        type: string
      classify:
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      status:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
      user_name:
        type: string
    type: object
  dto.UpdateCartItemRequest:
    properties:
      quantity:
        minimum: 1
        type: integer
    required:
    - quantity
    type: object
  dto.UpdateProfileRequest:
    properties:
      address:
        maxLength: 500
        type: string
      full_name:
        maxLength: 255
        minLength: 2
        type: string
      phone:
        maxLength: 20
        minLength: 10
        type: string
    required:
    - full_name
    type: object
  dto.UpdateRatingRequest:
    properties:
      comment:
        maxLength: 2000
        type: string
      rating:
        maximum: 5
        minimum: 1
        type: integer
    required:
    - rating
    type: object
  dto.UserResponse:
    properties:
      address:
        type: string
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      email_verified_at:
        type: string
      full_name:
        type: string
      id:
        type: integer
      phone:
        type: string
      role:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact: {}
  description: API documentation for Foods & Drinks.
  title: Foods & Drinks API
  version: "1.0"
paths:
  /:
    get:
      description: Welcome message for the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Welcome endpoint
      tags:
      - health
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /api/v1/auth/oauth/{provider}:
    get:
      description: Get OAuth authorization URL for the specified provider
      parameters:
      - description: OAuth provider (google, facebook, twitter)
        in: path
        name: provider
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OAuthURLResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Initiate OAuth flow
      tags:
      - oauth
  /api/v1/auth/oauth/{provider}/callback:
    get:
      description: Handle OAuth callback from provider
      parameters:
      - description: OAuth provider (google, facebook, twitter)
        in: path
        name: provider
        required: true
        type: string
      - description: Authorization code
        in: query
        name: code
        required: true
        type: string
      - description: State for CSRF protection
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Handle OAuth callback
      tags:
      - oauth
  /api/v1/auth/oauth/providers:
    get:
      description: Get list of supported OAuth providers
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OAuthProvidersResponse'
      summary: Get supported OAuth providers
      tags:
      - oauth
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email and password
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /api/v1/cart:
    delete:
      description: Remove all items in current user cart
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CartResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Clear current user cart
      tags:
      - cart
    get:
      description: Get cart of currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CartResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user cart
      tags:
      - cart
  /api/v1/cart/items:
    post:
      consumes:
      - application/json
      description: Add product to current user cart
      parameters:
      - description: Add cart item request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AddCartItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add item to cart
      tags:
      - cart
  /api/v1/cart/items/{product_id}:
    delete:
      description: Remove a product from current user cart
      parameters:
      - description: Product ID
        in: path
        name: product_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Remove item from cart
      tags:
      - cart
    put:
      consumes:
      - application/json
      description: Update quantity for a product in current user cart
      parameters:
      - description: Product ID
        in: path
        name: product_id
        required: true
        type: integer
      - description: Update cart item request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateCartItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CartResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update item quantity in cart
      tags:
      - cart
  /api/v1/orders:
    get:
      description: Get order history of current user with status/date filters and
        pagination
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: pending|confirmed|processing|shipping|delivered|cancelled
        in: query
        name: status
        type: string
      - description: From date (YYYY-MM-DD)
        in: query
        name: from_date
        type: string
      - description: To date (YYYY-MM-DD)
        in: query
        name: to_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List current user orders
      tags:
      - orders
    post:
      consumes:
      - application/json
      description: Create a new order from current user cart, snapshot item price/name,
        clear cart, and update stock
      parameters:
      - description: Create order request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create order from cart
      tags:
      - orders
  /api/v1/orders/{id}:
    get:
      description: Get detail of one order for current user including items
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get order detail
      tags:
      - orders
  /api/v1/products:
    get:
      description: Public API list products with filter, sort, search and pagination
      parameters:
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      - description: food or drink
        in: query
        name: classify
        type: string
      - description: Category ID
        in: query
        name: category_id
        type: integer
      - description: Min price
        in: query
        name: min_price
        type: number
      - description: Max price
        in: query
        name: max_price
        type: number
      - description: Min rating (0-5)
        in: query
        name: min_rating
        type: number
      - description: Full-text search
        in: query
        name: search
        type: string
      - default: created_at
        description: price|rating_average|name|created_at
        in: query
        name: sort_by
        type: string
      - default: desc
        description: asc|desc
        in: query
        name: sort_dir
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List products
      tags:
      - products
  /api/v1/products/{slug}:
    get:
      description: Public API get product detail by slug
      parameters:
      - description: Product slug
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get product detail
      tags:
      - products
  /api/v1/products/{slug}/ratings:
    get:
      description: Public API list ratings of a product with user info
      parameters:
      - description: Product slug
        in: path
        name: slug
        required: true
        type: string
      - default: 1
        description: Page
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: List product ratings
      tags:
      - ratings
    post:
      consumes:
      - application/json
      description: Create a rating for product by authenticated user (must have purchased)
      parameters:
      - description: Product slug
        in: path
        name: slug
        required: true
        type: string
      - description: Create rating request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateRatingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.RatingResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create product rating
      tags:
      - ratings
    put:
      consumes:
      - application/json
      description: Update rating of authenticated user for a product
      parameters:
      - description: Product slug
        in: path
        name: slug
        required: true
        type: string
      - description: Update rating request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateRatingRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RatingResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update product rating
      tags:
      - ratings
  /api/v1/profile:
    get:
      consumes:
      - application/json
      description: Get the profile of the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user profile
      tags:
      - profile
    put:
      consumes:
      - application/json
      description: Update the profile of the currently authenticated user
      parameters:
      - description: Update profile request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileRequest'
